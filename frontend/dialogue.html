<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punch Dialogues — THALAIVAR.AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .dialogue-header { text-align: center; padding: 6rem 2rem 2rem; }
    
    .ai-generator {
      max-width: 900px; margin: 0 auto 4rem;
      background: #000;
      border: 2px solid var(--gold-dark); border-radius: 4px; padding: 4rem;
      text-align: center; box-shadow: inset 0 0 40px rgba(255,184,0,0.1);
      position: relative;
    }
    .ai-generator::before {
      content: '🤖'; position: absolute; font-size: 8rem; opacity: 0.05; top: 1rem; right: 2rem;
    }
    
    .ai-result {
      font-family: 'Cinzel', serif; font-size: 2rem; color: #FFF; line-height: 1.5;
      margin: 2rem 0 3rem; min-height: 120px; display: flex; align-items: center; justify-content: center;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    }
    
    .dialogues-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem; padding: 2rem; max-width: 1300px; margin: 0 auto;
    }
    
    .dialogue-card {
      background: #0A0A0E; border: 1px solid #222; border-left: 4px solid var(--gold-primary);
      padding: 2.5rem 2rem; display: flex; flex-direction: column; position: relative;
      transition: var(--transition);
    }
    .dialogue-card:hover { border-color: var(--gold-primary); box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: translateY(-5px); }
    
    .dialogue-card::before {
      content: '"'; position: absolute; top: -10px; left: 10px;
      font-family: 'Cinzel', serif; font-size: 5rem; color: rgba(255,184,0,0.1); line-height: 1;
    }
    
    .dialogue-text { font-size: 1.25rem; font-weight: 600; color: #FFF; flex-grow: 1; margin-bottom: 2rem; line-height: 1.6; z-index: 1; }
    
    .dialogue-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #333; padding-top: 1rem; }
    
    .movie-tag { color: var(--gold-primary); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">⭐</div>
      <span class="logo-text">THALAIVAR<span>.AI</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">HOME</a></li>
      <li><a href="movies.html">FILMOGRAPHY</a></li>
      <li><a href="dialogue.html" class="active">PUNCH DIALOGUES</a></li>
      <li><a href="analytics.html">BOX OFFICE</a></li>
      <li><a href="fan-arena.html" class="nav-cta">FAN ARENA</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="dialogue-header">
      <div class="badge badge-gold mb-2">Iconic Lines</div>
      <h1 class="section-title">Words of <span>Legend</span></h1>
      <p class="section-subtitle">Dialogues that echo in every theater</p>
    </div>
    
    <div class="section pt-0">
      <div class="ai-generator animate-fade-in">
        <h3 style="font-family:'Cinzel',serif; font-size:2rem; margin-bottom:1rem; color:var(--gold-primary); letter-spacing:2px; text-transform:uppercase;">AI Punch Generator</h3>
        <p style="color:var(--text-secondary); margin-bottom:2rem; font-size:1.1rem;">Generate a fresh Thalaivar-style punch dialogue instantly.</p>
        
        <div class="ai-result" id="aiDialogueResult">
          "READY TO HEAR THE NEXT BIG PUNCH?"
        </div>
        
        <button class="btn btn-primary" onclick="generateDialogue()">
          <span style="font-size:1.2rem;">💥</span> GENERATE DIALOGUE
        </button>
      </div>
      
      <div class="dialogues-grid" id="dialoguesGrid">
        <!-- Populated via JS -->
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-brand">THALAIVAR.AI</div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/particles.js"></script>
  <script src="js/main.js"></script>
  <script src="js/dialogue.js"></script>
</body>
</html>
